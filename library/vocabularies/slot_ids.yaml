      - arrow_caption

# ─────────────────────────────────────────────────────────────────
# 5. pyramid / hierarchy / tiers —— N = 1..6
# ─────────────────────────────────────────────────────────────────
hierarchy:
  pattern_n:
    n_range: [1, 6]
    ids:
      - tier_N_label
      - tier_N_title
      - tier_N_body
      - tier_N_body_a
      - tier_N_body_b
      - tier_N_desc
