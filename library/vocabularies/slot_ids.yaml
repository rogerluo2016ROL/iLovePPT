# slot_ids · placeholder_map.yaml `slots[].id` 受控词典(SSOT)
#
# 用途:extractor 起 placeholder_map.yaml.draft 时,slots[].id 必须从这里选;
#       extractor_self_check.py #13 验证每个 id ∈ allowed enum;
#       author 选 pattern 时按这里的语义命中槽位。
#
# 设计原则:
#   1. N 是 1-indexed 占位(card_1_label, card_2_label, ..., card_8_label),
#      `n_range` 字段声明合法 N(默认 [1, 8])
#   2. 命名 schema:`<role>[_index?][_sub?]` snake_case
#   3. 不允许自由字符串;新增需扩 SSOT + 跑 self_check #13
#   4. `'?'` 是 inspect_placeholders.py 留的 skeleton sentinel(未填充),
#      legacy 模板允许(extractor v3+ 应 0)
#
# 引用:CLAUDE.md 关键不变量 / docs/optimization/2026-05-27-iLovePPT-optimization-plan.md P1-2

version: 1
schema:
  n_range_default: [1, 8]              # N 默认 1..8
  skeleton_sentinel: "?"               # inspect_placeholders.py 占位

# ─────────────────────────────────────────────────────────────────
# 1. common —— 任何 layout 都可能出现
# ─────────────────────────────────────────────────────────────────
common:
  - title                              # 大标题
  - subtitle                           # 副标题 / 小标题
  - subtitle_line1                     # 多行副标题
  - subtitle_line2
  - subtitle_line3
  - main_title                         # 别名:主标题(同 title,部分模板用此)
  - main_body                          # 主正文
  - main_text                          # 主短文字(显示性 · 跟 main_body 角色不同)
  - page_title                         # 页眉级标题
  - section_label                      # /01 /02 章节角标
  - section_number                     # 单独章节数字(canonical · section_num 已 deprecate)
  - section_index                      # 章节索引
  - section_title                      # 章节大标题
  - section_subtitle                   # 章节副标题
  - section_header                     # 章节头部
  - section_body                       # 章节正文
  - section_desc                       # 章节描述
  - body                               # 正文段落
  - description                        # 描述段
  - banner                             # 横幅文字
  - note                               # 注解
  - note_banner                        # 注解横幅
  - note_warning                       # 警告注解
  - instruction_note                   # 操作说明
  - transition_label                   # 过渡标签
  - supporting_text                    # 支撑性文字
  - footer_title                       # 页脚标题
  - footer_caption                     # 页脚说明
  - footer_note                        # 页脚注释
  - footer_link                        # 页脚链接
  - footer_url                         # 页脚网址
  - website_footer                     # 网站页脚
  - logo                               # logo 文字占位
  - slogan                             # slogan / tagline
  - tagline_cn                         # 双语 tagline
  - tagline_en
  - presenter                          # 演讲者
  - reporter                           # 报告人
  - speaker                            # 同上
  - speaker_info                       # 演讲者信息
  - speaker_subtitle                   # 演讲者副标题
  - designed_by                        # 设计者署名
  - date                               # 日期
  - year                               # 年份
  - site                               # 地点 / 网址
  - source_title                       # 数据来源标题
  - source_label                       # 数据来源标签
  - source_body                        # 数据来源正文
  - agenda_label                       # 议程标签
  - intro_title                        # 引言标题
  - intro_body                         # 引言正文
  - lead_heading                       # 主导标题
  - lead_caption                       # 主导说明
  - lead_body                          # 主导正文

# ─────────────────────────────────────────────────────────────────
# 2. cover / toc / closing —— 封面/目录/结束页
# ─────────────────────────────────────────────────────────────────
cover_toc_closing:
  - contents_title
  - contents_subtitle
  - toc_title
  - toc_intro
  - closing_title
  - thanks_title
  - thanks_word

# ─────────────────────────────────────────────────────────────────
# 3. cards —— N = 1..8(默认 1..6,training_team 见 ≤ 8)
# ─────────────────────────────────────────────────────────────────
cards:
  pattern_n:
    n_range: [1, 8]
    ids:
      - card_N_label                   # 卡片小标题
      - card_N_title                   # 卡片大标题
      - card_N_body                    # 卡片正文
      - card_N_body_a                  # 双正文 a
      - card_N_body_b                  # 双正文 b
      - card_N_desc                    # 卡片描述
      - card_N_caption                 # 卡片说明
      - card_N_badge                   # 卡片角标
      - card_N_number                  # 卡片数字 / 序号(canonical · card_N_num 已 deprecate)
      - card_N_icon                    # 卡片 icon 占位
      - card_N_image                   # 卡片图片占位
  pattern_position:                    # 卡片按九宫格位置(无 N)
    positions: [tl, tr, bl, br, left, right, top, bottom, center]
    ids:
      - card_tl_title                  # top-left
      - card_tl_body
      - card_tr_title                  # top-right
      - card_tr_body
      - card_bl_title                  # bottom-left
      - card_bl_body
      - card_br_title                  # bottom-right
      - card_br_body
      - card_left_title
      - card_left_body
      - card_right_title
      - card_right_body
      - card_center_title
      - card_center_body
  pattern_grid_lr:                     # 左右两栏每栏 N 个卡片(business_geometric 见)
    n_range: [1, 3]
    ids:
      - card_l1_title
      - card_l1_desc
      - card_l2_title
      - card_l2_desc
      - card_l3_title
      - card_l3_desc
      - card_r1_title
      - card_r1_desc
      - card_r2_title
      - card_r2_desc
      - card_r3_title
      - card_r3_desc

# ─────────────────────────────────────────────────────────────────
# 4. timeline / process_flow / sequential —— N = 1..8
# ─────────────────────────────────────────────────────────────────
sequential:
  pattern_n:
    n_range: [1, 8]
    ids:
