    ids:
      - root_title
      - root_body
      - parent_label
  children:
    n_range: [1, 6]
    sub_n_range: [1, 4]
    ids:
      - child_N_title
      - child_N_body
      - child_N_body_N                 # child_1_body_1, child_1_body_2 ...
  leaves:                              # leaf nodes
    n_range: [1, 4]
    ids:
      - leaf_N_title
      - leaf_N_body

# ─────────────────────────────────────────────────────────────────
# 6. venn / circles —— N = 1..4
