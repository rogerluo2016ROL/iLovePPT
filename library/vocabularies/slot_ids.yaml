      - q2_body
      - q2_desc
      - q2_number
      - q2_value
      - q3_label
      - q3_title
      - q3_body
      - q3_desc
      - q3_number
      - q3_value
      - q4_label
      - q4_title
      - q4_body
      - q4_desc
      - q4_number
      - q4_value
  corner:                              # 别名:用 corner_N 代替 q_N
    n_range: [1, 4]
