  toc-5:                     { layout_type: toc, description: "目录 · 5 项章节" }
  toc-6:                     { layout_type: toc, description: "目录 · 6 项章节" }
  toc-7:                     { layout_type: toc, description: "目录 · 7 项章节" }
  toc-8:                     { layout_type: toc, description: "目录 · 8 项章节" }
  toc-other:                 { layout_type: toc, description: "目录 · 其他变体" }

  # === section_divider (章节分隔) ===
