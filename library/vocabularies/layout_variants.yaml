# library/vocabularies/layout_variants.yaml
# layout_variants · 受控词典 · variant 跟 layout_type 同级
# extractor / author / build / RAG 都引用此 SSOT
# 改动这个文件 = 影响 RAG 索引,需要 re-embed
#
# Schema:
#   variant: enum         # 见下面 variants 字段(key 即 enum)
#   layout_type: enum     # 关联的 17 enum,self_check #12 验证一致
#   description: str      # 中文描述,自然语言,供 LLM extractor 参考
#
# 选 variant 启发(从粗到细):
#   1. 先定 layout_type(看页面整体结构)
#   2. 在该 layout_type 桶里选元素数(N)最接近的
#   3. 看 native_elements 是否含 "icon" / "image/photo/图片" → 选含/不含 icon/photo 的子枚举
#   4. 若桶里无 N=该数,选最接近的(如 7 项 → 6;或归到 -other 兜底)
#   5. 若实在不匹配,可用 "<layout_type>-other"(每个 layout_type 自带 -other 兜底)

variants:

  # === cover (封面) ===
  cover-text-only:           { layout_type: cover, description: "封面 · 纯文字标题 + 副标" }
  cover-illustration:        { layout_type: cover, description: "封面 · 含人物/物件插画" }
  cover-photo:               { layout_type: cover, description: "封面 · 含真实图片" }
  cover-geometric:           { layout_type: cover, description: "封面 · 含几何/抽象装饰" }
  cover-other:               { layout_type: cover, description: "封面 · 其他变体" }

  # === toc (目录) ===
  toc-3:                     { layout_type: toc, description: "目录 · 3 项章节" }
