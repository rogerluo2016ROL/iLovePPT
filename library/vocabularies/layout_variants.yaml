  section-divider-text:      { layout_type: section_divider, description: "章节分隔 · 纯文字标题" }
  section-divider-illustration: { layout_type: section_divider, description: "章节分隔 · 含插画装饰" }
  section-divider-photo:     { layout_type: section_divider, description: "章节分隔 · 含真实图片" }
  section-divider-other:     { layout_type: section_divider, description: "章节分隔 · 其他变体" }

  # === summary (总结) ===
