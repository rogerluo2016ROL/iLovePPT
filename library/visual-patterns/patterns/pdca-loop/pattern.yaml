id: pdca-loop
name: PDCA 迭代循环
category: cycle
content_intent:
  - "PDCA 多次迭代展示(Plan-Do-Check-Act 循环 N 轮)"
  - "持续改进方法论可视化"
  - "迭代复盘 / 敏捷 sprint 多轮"
visual_structure:
  n_items: variable                 # 通常 3-5 轮(PDCA 串联)
  shape: chained_pdca_arrows
  iteration_visible: true           # 多组 PDCA 串联可见
  has_phase_labels: true            # 每段标 P/D/C/A
  has_summary_text: true            # 下方一段总结文字
keywords:
  - PDCA
  - Plan Do Check Act
  - 戴明环
  - Deming cycle
  - 持续改进
  - 迭代
  - iteration
  - 敏捷 sprint
  - 复盘
when_to_use:
  - "PDCA 方法论介绍 / 培训"
  - "项目 N 轮迭代展示(每轮 Plan-Do-Check-Act)"
  - "强调'闭环改进 + 多次循环'"
when_not_to_use:
  - "单次循环 → 改 cycle-donut-3(更简洁)"
  - "非 PDCA 的步骤 → 改 numbered-cards 或 wavy-3-steps"
  - "需要展示数据驱动(不是方法论)→ 改 chart"
matches_iloveppt_layout: null
fallback_rendering:
  method: drawio_template
  notes: |
    draw.io 模板:N 个 PDCA 圆环串联(P→D→C→A→ 下一轮 P→D→C→A...)。
    每轮编号 01 / 02 / .. / n,下方一段总结文字。
    parameters:iteration_count(N)+ summary_text。
style_notes:
  - "P/D/C/A 各段配色:浅蓝阶梯(BRAND_TINT / BRAND_PRIMARY / BRAND_DARK 渐变)"
  - "每轮编号大字 GRAY_700,标在 PDCA 圆中心"
  - "底部总结文字 ≤ 30 字,GRAY_700 italic"
source_inspiration:
  composite_image: ../../_source_inspiration/2026-05-24-user-template-overview.png
  slide_position: 10
preview: preview.png
