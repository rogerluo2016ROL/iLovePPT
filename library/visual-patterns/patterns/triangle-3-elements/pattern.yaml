id: triangle-3-elements
name: 3 三角并列
category: hierarchy
content_intent:
  - "3 个独立但同型的组件(用同形状强调对等)"
  - "3 个相同维度但不同实例(产品 / 部门 / 战略支柱)"
  - "层级展示中的'三大支柱'"
visual_structure:
  n_items: 3
  shape: triangles
  arrangement: stacked              # 错落上下排列(非水平等距)
  triangles_overlap_slightly: false
  has_side_descriptions: true
keywords:
  - 三角
  - 三支柱
  - pillars
  - 三大
  - 同型对等
  - 组件
  - 模块
when_to_use:
  - "公司战略 3 大支柱(技术 / 产品 / 增长)"
  - "产品 3 大模块独立但同重要"
  - "强调'三足' visual metaphor"
when_not_to_use:
  - "需要展示先后顺序 → 改 timeline / wavy-3-steps"
  - "需要强调互锁 / 制约 → 改 triangle-cycle-3"
  - "3 段是并列要点但没'支柱'语义 → 改 cards"
matches_iloveppt_layout: null
fallback_rendering:
  method: drawio_template
  notes: |
    draw.io:3 个三角形(可错落 vertical 排版)+ 右侧每个一段描述。
    比 cards 多了"三角"几何 metaphor,适合"支柱 / 鼎立"含义。
style_notes:
  - "三角填充 BRAND_PRIMARY,描边深一档"
  - "3 个三角大小一致(对等性)"
  - "右侧描述跟对应三角中点对齐"
source_inspiration:
  composite_image: ../../_source_inspiration/2026-05-24-user-template-overview.png
  slide_position: 6
preview: preview.png
