id: timeline-3-events
name: 3 事件时间轴
category: process
content_intent:
  - "3 个里程碑按时间顺序展示,有明确日期"
  - "项目路线图分 3 阶段,每段有起止时间"
  - "公司发展史关键节点(3-5 个里程碑)"
visual_structure:
  n_items: 3
  axis: horizontal
  has_dates: true
  has_descriptions: true
  date_position: on_line          # 日期标在时间线上,描述在上下交替
  alternating_above_below: true
keywords:
  - 时间轴
  - 路线图
  - roadmap
  - timeline
  - milestone
  - 里程碑
  - Q1Q2Q3
  - 季度
  - 历程
  - 历史
when_to_use:
  - "项目分 3 阶段,有具体季度 / 月份 / 日期"
  - "公司发展 / 产品迭代历程,带时间锚点"
  - "需要强调'前后顺序 + 时间间隔'两件事"
when_not_to_use:
  - "无明确日期 → 改用 numbered-cards-3 或 wavy-3-steps"
  - "节点 > 5 个 → 改 bullet_list 或 table(timeline 过密会拥挤)"
  - "节点是并列而非时序 → 改 cards 或 compare"
matches_iloveppt_layout: null     # 13 内置 layout 都没有 timeline,现画
fallback_rendering:
  method: drawio_template          # 推荐:画一份 parameterized .drawio
  notes: |
    第一版没有现成模板。author 看到这个 pattern 后,调 diagram skill 用
    draw.io 现画(横向时间线 + 3 节点圆 + 日期 above + 描述 below)。
    后续可在 library/drawio_templates/timeline_3.drawio 加 parameterized 模板。
style_notes:
  - "时间线主色 BRAND_PRIMARY,节点圆同色"
  - "日期字号 ≥ 16pt,描述 ≤ 30 字单行"
  - "上下交替排版避免拥挤(上 / 下 / 上)"
source_inspiration:
  composite_image: ../../_source_inspiration/2026-05-24-user-template-overview.png
  slide_position: 1
preview: preview.png
