id: photo-with-3-points
name: 左照片 + 右 3 编号点
category: relationship
content_intent:
  - "左侧情景照片 + 右侧 3 个编号要点(上下文化)"
  - "用真实场景照锚定主题,3 要点配解释"
  - "客户案例介绍 / 团队介绍 / 工作场景 + 3 卖点"
visual_structure:
  n_items: 3
  layout: left_image_right_list
  image_ratio: 0.4                  # 左图占 40% 宽
  list_numbered: true               # 右侧 1/2/3 编号 badge
  description_per_item: true
keywords:
  - 图文
  - 照片
  - hero image
  - pic+text
  - 案例
  - 场景
  - 介绍
  - photo with bullets
when_to_use:
  - "deck 开篇引导 / 章节扉页:用照片营造情景 + 3 要点"
  - "客户案例:左照片 + 右 3 卖点"
  - "团队介绍:照片 + 3 个核心能力"
when_not_to_use:
  - "无合适照片(强行 stock photo 反而扣分)→ 改 cards"
  - "要点 ≠ 3 → 改 cards(4-5)或 single_focus(1)"
  - "数据为主 → 改 pic_text 含 chart 而非 hero photo"
matches_iloveppt_layout: pic_text   # iLovePPT pic_text 接近(左图右点)
fallback_rendering:
  method: python_make_func
  python_layout: pic_text
  notes: |
    iLovePPT pic_text 已支持(左图 + 右侧 N 个 {title, body} 卡)。
    本 pattern 是 pic_text 加 numbered badge 变体 —— author 用 pic_text 时
    把 point 标题前缀加 "1." / "2." / "3." 或用 emoji ① ② ③(themes 现版可能
    不渲染圆形 badge,但视觉接近)。
style_notes:
  - "照片应是真实场景(避免明显 stock photo 视觉)"
  - "右侧编号 badge BRAND_PRIMARY 圆底白字"
  - "每点描述 1-2 行,跟编号对齐"
source_inspiration:
  composite_image: ../../_source_inspiration/2026-05-24-user-template-overview.png
  slide_position: 5
preview: preview.png
