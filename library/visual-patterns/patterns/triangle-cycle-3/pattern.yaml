id: triangle-cycle-3
name: 三角中心 + 3 段循环
category: cycle
content_intent:
  - "3 个相互制约 / 强约束的部分(用三角中心表达稳定性)"
  - "3 个核心价值组成三角金字塔"
  - "战略三要素(成本 / 质量 / 速度 之类)互锁关系"
visual_structure:
  n_items: 3
  shape: donut_with_center_triangle
  segments_equal: true
  center_element: triangle
  meaning: tension_or_synergy       # 强调三者互锁(非简单循环)
keywords:
  - 三角
  - 三要素
  - 互锁
  - triangle
  - trade-off
  - 平衡
  - 稳定
  - 金三角
when_to_use:
  - "3 个相互制约的维度(经典 trade-off:成本/质量/速度)"
  - "强调'三足鼎立'稳定性"
  - "战略三要素 / 文化三支柱"
when_not_to_use:
  - "3 个独立的并列点 → 改 cards(没有互锁含义)"
  - "时序流程 → 改 timeline-3-events"
  - "数据比例 → 改 chart"
matches_iloveppt_layout: null
fallback_rendering:
  method: drawio_template
  notes: |
    draw.io:donut 3 段 + 中心放三角形(三角顶点对齐 3 段中点)。
    比 cycle-donut-3 多了"中心几何稳定"的语义。
style_notes:
  - "三角形描边 BRAND_PRIMARY,内部填充浅色或留白"
  - "三角与 donut 同心,视觉上'锁住' 3 段"
source_inspiration:
  composite_image: ../../_source_inspiration/2026-05-24-user-template-overview.png
  slide_position: 3
preview: preview.png
