id: two-loop-flow
name: 双圆互锁 + 4 描述
category: relationship
content_intent:
  - "2 个实体(A & B)之间的双向往返关系"
  - "供需 / 输入输出 / 互相反馈的闭环"
  - "4 角落各一段描述支持 A↔B 流动"
visual_structure:
  n_items: 2_main_4_supporting     # 主体 2 + 支持描述 4
  shape: two_circles_with_arrows
  arrows_bidirectional: true        # A → B 和 B → A 双向
  supporting_text_boxes: 4          # 左上/左下/右上/右下 4 个文本框
  central_focus: relationship
keywords:
  - 双向
  - 互锁
  - 反馈循环
  - feedback loop
  - 供需
  - 双圆
  - bidirectional
  - A↔B
when_to_use:
  - "供需关系 / 客户与服务商的双向价值"
  - "DevOps:开发 ↔ 运维 双向反馈"
  - "强调'两方持续互动'的健康关系"
when_not_to_use:
  - "单向流(只是 A → B)→ 改 cards 或 timeline"
  - "3 方关系 → 改 triangle-cycle-3"
  - "纯并列 2 比较 → 改 compare_pk"
matches_iloveppt_layout: compare_pk  # 接近但视觉不一样
fallback_rendering:
  method: drawio_template
  notes: |
    draw.io:2 个圆(A 和 B)+ 双向弯曲箭头中间 + 4 个角落小文本框。
    iLovePPT compare_pk 是 VS 对决式(对立),本 pattern 是协作式(双向流),
    语义不同 —— 不要直接套 compare_pk。
style_notes:
  - "A 圆 BRAND_PRIMARY,B 圆 BRAND_DARK(区分但同色系)"
  - "双向箭头同色,粗一档强调'持续往返'"
  - "4 角文本框灰底淡边,描述对应方向的内容"
source_inspiration:
  composite_image: ../../_source_inspiration/2026-05-24-user-template-overview.png
  slide_position: 7
preview: preview.png
