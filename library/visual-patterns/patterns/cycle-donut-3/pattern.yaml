id: cycle-donut-3
name: 3 段环形循环
category: cycle
content_intent:
  - "3 阶段循环过程(等权重,环形布局)"
  - "PDCA 单次循环的简化版(无 act-then-plan 迭代意味)"
  - "3 部分围绕中心主题相互支撑"
visual_structure:
  n_items: 3
  shape: donut                     # 中空环形
  segments_equal: true              # 3 段等大
  has_center_icon: true             # 中心放图标或文字
  has_side_labels: true             # 每段对应一段说明文字(左右排布)
keywords:
  - 循环
  - 闭环
  - 环形
  - donut
  - cycle
  - 三段循环
  - 流程闭环
when_to_use:
  - "强调'循环 + 等权重' 3 个组成部分"
  - "敏捷开发 sprint 流程(plan / do / retro 3 段)"
  - "营销漏斗的简化版(吸引 / 转化 / 留存)"
when_not_to_use:
  - "迭代 N 轮 → 改 pdca-loop(多组 PDCA 串联)"
  - "需要展示数据比例 → 改 matplotlib pie chart"
  - "段数 ≠ 3 → 改 cards(4+段)或 compare_pk(2 段)"
matches_iloveppt_layout: null
fallback_rendering:
  method: drawio_template
  notes: |
    draw.io 现画:donut 环 3 段(等弧)+ 中心圆图标 + 3 段外侧标签连线。
    建议参数化 segment_label_1/2/3 + side_text_1/2/3 + center_label。
style_notes:
  - "3 段颜色用 BRAND_PRIMARY / BRAND_DARK / ACCENT 三色分(不再加色)"
  - "中心 icon 用 GRAY_700 或 BRAND_DARK,避免抢色"
  - "side 标签字号 ≤ 18pt,1-2 行"
source_inspiration:
  composite_image: ../../_source_inspiration/2026-05-24-user-template-overview.png
  slide_position: 2
preview: preview.png
