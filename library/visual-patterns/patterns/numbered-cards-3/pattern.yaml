id: numbered-cards-3
name: 3 编号卡片
category: process
content_intent:
  - "3 个有顺序的步骤 / 要点(带编号 badge)"
  - "简单的 3-step 流程,无时间戳"
  - "突出'1-2-3'顺序但视觉简洁"
visual_structure:
  n_items: 3
  arrangement: horizontal_row
  has_numbered_badge: true          # 每张卡左上有编号圆
  has_card_separator: vertical_line # 卡之间细分隔线
  description_per_card: true
keywords:
  - 编号
  - 步骤
  - 1-2-3
  - numbered
  - cards
  - steps
  - 三步走
when_to_use:
  - "3 个步骤但无时间锚点(timeline 不合适)"
  - "强调'1-2-3'顺序但不要 timeline 复杂度"
  - "简单的方法论 3 步走"
when_not_to_use:
  - "有时间日期 → 改 timeline-3-events"
  - "强调 organic / journey 感 → 改 wavy-3-steps"
  - "等权重无顺序 → 改 cards(不加编号)"
matches_iloveppt_layout: cards       # 接近,加编号 badge
fallback_rendering:
  method: python_make_func
  python_layout: cards
  notes: |
    iLovePPT cards 直接用,但加 numbered badge 视觉差异需要 author 在
    cards.title 前加 "1." / "2." / "3." 前缀。
    若要真正的圆形 numbered badge → 需要扩展 make_cards 支持 numbered
    参数(后续投资点)。
style_notes:
  - "编号圆 BRAND_PRIMARY 圆底白字,直径 40-50pt"
  - "卡之间细 GRAY_300 竖线分隔(非框)"
  - "每卡 title + body,body ≤ 18 字"
source_inspiration:
  composite_image: ../../_source_inspiration/2026-05-24-user-template-overview.png
  slide_position: 8
preview: preview.png
