id: wavy-3-steps
name: 波浪 3 步
category: process
content_intent:
  - "3 步骤 + 有机进程感(非严格时序)"
  - "用户体验 journey 3 阶段"
  - "强调'流畅过渡'非'离散时间点'"
visual_structure:
  n_items: 3
  shape: wavy_line_with_nodes       # 波浪曲线 + 3 节点圆
  has_numbered_badge: true
  curve_direction: horizontal_flow
  description_per_node: true
keywords:
  - 波浪
  - journey
  - 演进
  - 流动
  - organic
  - wavy
  - flow
  - 用户体验
when_to_use:
  - "用户 onboarding journey 3 阶段(讲故事感)"
  - "产品演进路径(强调'有机生长'非'严格 milestone')"
  - "比 timeline 软,比 numbered-cards 有动感"
when_not_to_use:
  - "有明确日期 → 改 timeline-3-events(精度更高)"
  - "强制步骤(不能跳过)→ 改 numbered-cards-3(清晰)"
  - "循环过程 → 改 cycle-donut-3"
matches_iloveppt_layout: null
fallback_rendering:
  method: drawio_template
  notes: |
    draw.io:水平波浪曲线 + 3 节点圆(numbered badge)+ 每节点下方描述。
    波浪起伏让 3 节点不在一条直线上,体现"journey 高低"。
style_notes:
  - "波浪曲线 GRAY_500 中等粗,节点圆 BRAND_PRIMARY 实心"
  - "节点 numbered badge 直径 36-40pt"
  - "节点位置错落:第 1 中等 / 第 2 略低 / 第 3 略高(或类似变化)"
source_inspiration:
  composite_image: ../../_source_inspiration/2026-05-24-user-template-overview.png
  slide_position: 9
preview: preview.png
