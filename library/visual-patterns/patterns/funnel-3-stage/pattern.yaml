id: funnel-3-stage
name: 3 阶漏斗
category: process
content_intent:
  - "3 阶段递减漏斗(转化 / 筛选 / 过滤)"
  - "销售漏斗 / 用户转化率分层"
  - "信息分层 + 每层 icon + 说明"
visual_structure:
  n_items: 3
  shape: trapezoid_stack            # 倒梯形堆叠
  descending: true                  # 上宽下窄
  has_icons_per_layer: true
  has_side_descriptions: true
keywords:
  - 漏斗
  - funnel
  - 转化
  - conversion
  - 销售漏斗
  - 分层
  - 筛选
  - 递减
when_to_use:
  - "用户转化漏斗:浏览 → 注册 → 付费"
  - "招聘漏斗:简历 → 面试 → offer"
  - "营销漏斗:awareness / consideration / conversion"
when_not_to_use:
  - "等权重 3 段 → 改 cards 或 cycle-donut-3"
  - "时序但无递减含义 → 改 timeline 或 wavy-3-steps"
  - "层数 > 4 → 漏斗过窄,改 bullet_list + chart"
matches_iloveppt_layout: null
fallback_rendering:
  method: drawio_template
  notes: |
    draw.io:3 个递减梯形 + 每层中央 icon + 右侧每层一段 18 字描述。
    用 BRAND_DARK → BRAND_PRIMARY → BRAND_TINT 三色递减(深 → 浅)体现"递减"语义。
style_notes:
  - "漏斗 3 段配色:从深到浅(BRAND_DARK / BRAND_PRIMARY / ACCENT)"
  - "icon 圆形白底浮在每段中央"
  - "右侧描述行高对齐每段中心"
source_inspiration:
  composite_image: ../../_source_inspiration/2026-05-24-user-template-overview.png
  slide_position: 4
preview: preview.png
