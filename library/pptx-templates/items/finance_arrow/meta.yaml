id: finance_arrow
name: Finance Arrow · 财务数据分析报告专用模板
category: finance
content_intent:
- 年度财务数据汇报演讲(主营业务收入 / 利润 / 费用 / 投资收益 / 净利润)
- 预算完成情况分析与方差解读
- 资产结构与质量分析报告
- 重要财务问题暴露 + 改进建议
- 4 章节标准财报骨架(数据摘要 → 财务分析 → 预算分析 → 问题建议)
when_to_use:
- 面向 CFO / 财务总监 / 董事会的季度 / 年度财报路演
- 需要专属"财务"语义视觉(arrow 上行 + target 命中 + megaphone 宣讲 + heart 关怀)
- 内容偏数据 + 占比 + 同比环比,卡片 / 表格 / donut / radial 是主力 layout
- 适合制作 20-30 页中等规模 deck,4 个清晰章节
- 用户希望保留 iSlide 风格的橙黄 + 深蓝灰对比 + 大留白
