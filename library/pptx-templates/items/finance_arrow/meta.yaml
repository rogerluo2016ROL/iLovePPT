visual_signature:
- 主色橙黄 (#F5A623 系) + 辅助深蓝灰 (#5B6478 系) + 点缀蓝 (#3FA7E3) + 红心 (#E94B4B)
- 标志性 "上升箭头 + megaphone 人物" 插画(cover / section divider / closing 三处复用,强品牌签名)
- 大量白色留白(标题 + 单行/单列内容偏左,装饰元素压右)
- 标题用粗黑中文 + 顶部细灰水平分割线(顶部装饰条)
- 章节扉页用大号橙黄 "/0X" 数字 + 章节中文标题(数字风格突出)
- 数据可视化偏好:donut / radial / 圆环节点 / 4 数字大圆 / 数据对比表
- 页底固定水印 "www.islide.cc" + 右下页码(iSlide 出品提示,使用前可隐藏)
- 西文用 Helvetica/Arial 风格,中文用粗黑无衬线(Source Han Sans / 微软雅黑系)
