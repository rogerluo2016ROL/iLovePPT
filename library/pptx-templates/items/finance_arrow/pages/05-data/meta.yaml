id: finance_arrow__05-data
name: "Data · 5-column × 7-row 表格(主营业务利润 / 报告期 / 去年同期 / 增减额度 / 增减幅度)"
layout_type: data
content_intent:
  - 财务对比表(5 列 × 7 行 = 35 cell)
  - '列头: 业务利润 | 报告期(突出色)| 去年同期 | 增减额度 | 增减幅度'
  - 适合摆放某 1 个财务指标在多业务 + 多对比维度下的逐项数据
when_to_use:
  - 必须有明确表格结构数据(>= 3 列 + >= 3 行)
  - 需要列对比(列头明确)
  - 「报告期」列默认醒目橙黄背景 — 表示当期数据
  - 不适合数据量极小(< 3 行只用 cards 即可)或图表更直观的数据(用 chart)
keywords:
  - 表格
  - data table
  - 财务对比表
  - 5 列 7 行
  - 报告期 vs 去年同期
  - 增减额度
  - 增减幅度
variant: data-table
native_elements:
  - 顶部左对齐中文页面标题 "主营业务利润" + 横向灰分割线
  - '5 列表头横向排列: 深灰底白字 (业务利润 / 去年同期 / 增减额度 / 增减幅度) + 醒目橙黄底白字 (报告期)'
  - 7 行数据单元格(每行 5 cell)· 内容默认 "□..."占位
  - 第 4 行报告期列是橙黄实心方块(突出某关键行)
  - 整体行间距宽松 · 大量留白
  - 底部小字 "www.islide.cc" + 页码

