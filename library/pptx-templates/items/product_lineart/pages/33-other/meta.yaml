id: product_lineart__33-other
name: "iSlide 工具说明页 (主题色彩 + 主题字体 + 预设参考线)"
layout_type: other
layout_hint: "模板自带工具说明,展示主题色板 + 字体规范 + ALT+F9 参考线快捷键;非内容页"

content_intent:
  - 展示模板预设的主题色彩 (Text/Background + Fill Colors 两组色板共 10 色)
  - 声明主题字体规范 (中文 Microsoft YaHei / 英文 Arial)
  - 展示预设参考线布局示意 (含 ALT+F9 快捷键说明)
  - 提示通过 iSlide 色彩库 / 统一字体 / 一键优化扩展配置
  - 右上角红色 Note 框明确指出 "本页为说明页,使用时请删除本页内容"

when_to_use:
  - 通常不在内容流中,作模板配色 / 字体规范参考保留
  - 模板使用者初次打开 .pptx 时查看色板 / 字体 / 参考线规范
  - 设计师 / 模板调优时参照主题色 hex 与字体配置
  - 正式 deck 制作前应删除本页(模板自带 Note 提示)
  - 二次开发模板时作 design token 来源页参考

native_elements:
  - 标题区:大字号 "设计标准 Design Criteria" 通栏标题
  - 主题色彩区:10 个圆形 swatch (左 4 个 Text/Background + 右 6 个 Fill Colors),含蓝/黄/天蓝/灰阶
  - 主题色彩说明文字:"可以通过 iSlide 【色彩库】功能,快速应用更多色彩"
  - 主题字体区:中文字体 微软雅黑 + 英文字体 Arial 规范条
  - 主题字体说明:"可以在【设计】菜单【字体】中改变,或应用 iSlide【统一字体】功能改变设置"
  - 预设参考线区:灰色矩形 + 多条虚线连接符演示 16:9 安全区 + 对角线参考
  - 参考线快捷键标注:"ALT+F9 开启和查看本主题预设的参考线"
  - 右上角红色 Note 警示框:"本页为说明页,使用时请删除本页内容"

