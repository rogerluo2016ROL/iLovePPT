id: product_lineart
name: Product Lineart · 蓝色线稿产品/科技通用模板
category: enterprise-modern
content_intent:
- 产品/科技类汇报、方案介绍、功能/服务说明
- SaaS / 工具 / 平台类产品的对外路演与白皮书
- 互联网团队内部分享、季度复盘、产品迭代说明
- 跨行业通用商务汇报(销售、市场、培训皆可)
- 强调"过程 / 结构 / 关系"展示的中性场合
when_to_use:
- 受众包含产品经理 / 工程师 / 业务方 / 客户,需要科技感视觉但不浮夸
- 内容含较多流程 / 节点 / 步骤 / 模块化结构,需要可视化结构图支持
- 希望深蓝主色 + 留白 + 黄色点缀的清爽专业风格
- 中性商务场合,既不太严肃也不太活泼,适合 8-30 页的中长 deck
- 没有强行业属性(医疗 / 教育 / 金融定制设计),希望一套通用模板满足多场景
