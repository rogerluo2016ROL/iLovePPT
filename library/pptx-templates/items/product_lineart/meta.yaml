- 主色 dodger blue (#1E9FE5) + 辅色 amber yellow (#FCB900) + 中性深灰
- 大量白色留白底色,无强背景纹理,清爽现代
- 蓝色/黄色交替的强调节奏(同一图表中蓝黄交错出现,强调节奏感)
